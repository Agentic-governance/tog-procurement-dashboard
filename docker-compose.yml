services:
  redis:
    image: redis:7-alpine
    container_name: procurement-redis
    restart: unless-stopped
    mem_limit: 128m

  dashboard:
    build: .
    container_name: procurement-monitor
    ports:
      - "8009:8007"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - MUNI_MCP_URL=http://78.46.57.151:8004/mcp/
      - GOVT_MCP_URL=http://78.46.57.151:8003/mcp/
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 512m

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: procurement-agent
    ports:
      - "8010:8010"
    volumes:
      - ./data:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - MUNI_MCP_URL=http://78.46.57.151:8004/mcp/
      - GOVT_MCP_URL=http://78.46.57.151:8003/mcp/
      - AGENT_DB_PATH=/app/data/monitor.db
    restart: unless-stopped
    mem_limit: 256m
